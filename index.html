<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM Leads — Herbolaria Saludable</title>
  <link rel="icon" href="data:;base64,iVBORw0KGk4=">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div id="login-container" class="login-wrapper">
    <div class="login-card">
      <div class="login-logo"><i class="ti ti-lock"></i></div>
      <h2>Acceso al CRM</h2>
      <p>Herbolaria Saludable</p>
      <div class="form-group">
        <label>Usuario</label>
        <input type="text" id="login-user" placeholder="Ingresa tu usuario">
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="login-pass" placeholder="••••••••">
      </div>
      <button class="btn btn-primary" style="width:100%; justify-content:center; margin-top:10px;" onclick="handleLogin()">
        <i class="ti ti-login"></i> Iniciar Sesión
      </button>
      <div id="login-error" class="login-error-msg" style="display:none;">Usuario o contraseña incorrectos</div>
    </div>
  </div>

  <div class="layout" id="main-layout" style="display:none">
    <div class="header">
      <div class="header-title">
        <div class="logo"><i class="ti ti-spa"></i></div>
        <div>
          <h1>CRM Leads</h1>
          <div class="subtitle">Herbolaria Saludable — Control de Prospectos</div>
        </div>
      </div>
      <div class="header-actions">
        <button class="btn btn-primary" onclick="openNewLead()"><i class="ti ti-plus"></i> Nuevo Lead</button>
        <button class="btn btn-danger" onclick="handleLogout()"><i class="ti ti-logout"></i> Salir</button>
      </div>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('dashboard',this)"><i class="ti ti-layout-dashboard"></i> Dashboard</div>
      <div class="tab" onclick="switchTab('leads',this)"><i class="ti ti-users"></i> Todos los Leads</div>
      <div class="tab" onclick="switchTab('seguimiento',this)"><i class="ti ti-clock"></i> Seguimiento</div>
      <div class="tab" onclick="switchTab('config',this)"><i class="ti ti-settings"></i> Configuración</div>
    </div>

    <div id="tab-dashboard"></div>
    <div id="tab-leads" style="display:none"></div>
    <div id="tab-seguimiento" style="display:none"></div>
    <div id="tab-config" style="display:none"></div>
  </div>

  <div class="overlay" id="overlay" onclick="closePanel(event)">
    <div class="panel" id="panel">
      <button class="panel-close" onclick="closePanel()"><i class="ti ti-x"></i></button>
      <h2 class="panel-title" id="panel-title">Nuevo Lead</h2>
      
      <div class="form-grid">
        <div class="form-group">
          <label>Nombre del Prospecto *</label>
          <input type="text" id="n-nombre" placeholder="Ej. Juan Pérez">
        </div>
        <div class="form-group">
          <label>Empresa</label>
          <input type="text" id="n-empresa" placeholder="Ej. Distribuidora Alfa">
        </div>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label>Teléfono</label>
          <input type="text" id="n-tel" placeholder="Ej. 2221234567">
        </div>
        <div class="form-group">
          <label>Correo</label>
          <input type="email" id="n-correo" placeholder="Ej. juan@correo.com">
        </div>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label>Origen / Canal</label>
          <select id="n-fuente"></select>
        </div>
        <div class="form-group">
          <label>Producto de Interés</label>
          <select id="n-producto"></select>
        </div>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label>Monto Estimado ($)</label>
          <input type="number" id="n-monto" placeholder="0.00">
        </div>
        <div class="form-group">
          <label>Presupuesto</label>
          <select id="n-presupuesto"></select>
        </div>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label>Área Responsable</label>
          <select id="n-responsable"></select>
        </div>
        <div class="form-group">
          <label>Ejecutivo Asignado</label>
          <select id="n-ejecutivo"></select>
        </div>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label>Prioridad</label>
          <select id="n-prioridad"></select>
        </div>
        <div class="form-group">
          <label>Estado del Pipeline</label>
          <select id="n-situacion"></select>
        </div>
      </div>

      <div class="form-group">
        <label>Próximo Seguimiento</label>
        <input type="datetime-local" id="n-seg">
      </div>

      <div class="form-group">
        <label>Notas y Bitácora de Seguimiento</label>
        <textarea id="n-notas" rows="4" placeholder="Escribe aquí los detalles del contacto..."></textarea>
      </div>

      <div class="panel-actions">
        <button id="btn-delete-lead" class="btn btn-danger" style="display:none;" onclick="eliminarLeadActual()">
          <i class="ti ti-trash"></i> Eliminar Lead
        </button>
        <div style="display:flex; gap:8px; margin-left:auto;">
          <button class="btn" onclick="closePanel()">Cancelar</button>
          <button class="btn btn-primary" onclick="guardarLeadFormulario()">
            <i class="ti ti-device-floppy"></i> Guardar Prospecto
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
