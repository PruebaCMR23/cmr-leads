<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM Leads - Herbolaria Saludable</title>
  <!-- Google Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  
  <!-- Estilos en la raíz -->
  <link rel="stylesheet" href="styles.css">
  
  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- Barra Lateral (Sidebar) -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <span class="material-symbols-outlined logo-icon">spa</span>
      <h2>CRM Herbolaria</h2>
    </div>
    <nav class="sidebar-menu">
      <button class="menu-item active" data-tab="dashboard">
        <span class="material-symbols-outlined">dashboard</span>
        <span>Dashboard</span>
      </button>
      <button class="menu-item" data-tab="leads">
        <span class="material-symbols-outlined">group</span>
        <span>Leads</span>
      </button>
      <button class="menu-item" data-tab="config">
        <span class="material-symbols-outlined">settings</span>
        <span>Configuración</span>
      </button>
    </nav>
  </aside>

  <!-- Contenido Principal -->
  <main class="main-content">
    <!-- Header -->
    <header class="top-header">
      <div class="header-search">
        <span class="material-symbols-outlined">search</span>
        <input type="text" id="global-search" placeholder="Buscar leads...">
      </div>
      <button class="btn btn-primary" id="btn-new-lead">
        <span class="material-symbols-outlined">add</span>
        Nuevo Lead
      </button>
    </header>

    <!-- Contenedores de Vistas -->
    <div id="tab-dashboard" class="tab-content active">
      <!-- El JS inyectará las métricas aquí dinámicamente -->
    </div>

    <div id="tab-leads" class="tab-content">
      <div class="table-container">
        <table class="leads-table">
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Teléfono</th>
              <th>Producto</th>
              <th>Origen</th>
              <th>Ejecutivo</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="leads-tbody">
            <!-- Cargados dinámicamente -->
          </tbody>
        </table>
      </div>
    </div>

    <div id="tab-config" class="tab-content">
      <div class="config-card">
        <h3>Ajustes del Sistema</h3>
        <p>Gestiona los parámetros operativos de tu CRM.</p>
        <!-- Formulario o controles de configuración pueden ir aquí -->
      </div>
    </div>
  </main>

  <!-- Panel Lateral / Modal (Formulario de Leads) -->
  <div class="overlay" id="form-overlay"></div>
  <div class="side-panel" id="lead-panel">
    <div class="panel-header">
      <h3 id="panel-title">Nuevo Lead</h3>
      <button class="btn-close" id="btn-close-panel">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <form id="lead-form" class="panel-form">
      <input type="hidden" id="lead-id">
      
      <div class="form-group">
        <label for="lead-name">Nombre Completo *</label>
        <input type="text" id="lead-name" required placeholder="Ej. Juan Pérez">
      </div>

      <div class="form-group">
        <label for="lead-phone">Teléfono / WhatsApp *</label>
        <input type="tel" id="lead-phone" required placeholder="Ej. +52 222 123 4567">
      </div>

      <div class="form-group">
        <label for="lead-product">Producto de Interés *</label>
        <select id="lead-product" required>
          <option value="">Selecciona un producto</option>
          <!-- Productos dinámicos desde Config -->
        </select>
      </div>

      <div class="form-group">
        <label for="lead-origin">Origen del Lead *</label>
        <select id="lead-origin" required>
          <option value="">Selecciona el origen</option>
          <!-- Orígenes dinámicos desde Config -->
        </select>
      </div>

      <div class="form-group">
        <label for="lead-agent">Ejecutivo Asignado</label>
        <select id="lead-agent">
          <option value="">Selecciona un ejecutivo</option>
          <!-- Ejecutivos dinámicos desde Config -->
        </select>
      </div>

      <div class="form-group">
        <label for="lead-status">Estado del Lead</label>
        <select id="lead-status">
          <option value="Nuevo">Nuevo</option>
          <option value="En Proceso">En Proceso</option>
          <option value="Convertido">Convertido</option>
          <option value="Perdido">Perdido</option>
        </select>
      </div>

      <div class="form-group">
        <label for="lead-notes">Notas / Comentarios</label>
        <textarea id="lead-notes" rows="4" placeholder="Detalles adicionales de la interacción..."></textarea>
      </div>

      <button type="submit" class="btn btn-primary btn-block">Guardar Lead</button>
    </form>
  </div>

  <!-- Script desde la carpeta app -->
  <script src="app/app.js"></script>
</body>
</html>
