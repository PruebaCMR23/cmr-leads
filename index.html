<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM Leads — Herbolaria Saludable</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div id="login-container" class="login-wrapper">
    <div class="login-card">
      <div class="login-logo"><i class="ti ti-lock"></i></div>
      <h2>Acceso al CRM</h2>
      <p>Herbolaria Saludable</p>
      <div class="form-group">
        <label>Usuario</label>
        <input type="text" id="login-user" placeholder="Ingresa tu usuario">
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="login-pass" placeholder="••••••••">
      </div>
      <button class="btn btn-primary" style="width:100%; justify-content:center; margin-top:10px;" onclick="handleLogin()">
        <i class="ti ti-login"></i> Iniciar Sesión
      </button>
      <div id="login-error" class="login-error-msg" style="display:none;"></div>
    </div>
  </div>

  <div id="main-layout" style="display:none;">
    <div class="topbar">
      <div class="brand">
        <div class="logo"><i class="ti ti-leaf"></i></div>
        <div>
          <h1>Herbolaria Saludable</h1>
          <p>Panel de Control de Leads</p>
        </div>
      </div>
      <div class="actions">
        <button class="btn btn-primary" onclick="openNewLead()"><i class="ti ti-plus"></i> Nuevo Lead</button>
        <button class="btn btn-danger" onclick="handleLogout()"><i class="ti ti-logout"></i> Salir</button>
      </div>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('dashboard',this)"><i class="ti ti-layout-dashboard"></i> Dashboard</div>
      <div class="tab" onclick="switchTab('leads',this)"><i class="ti ti-users"></i> Todos los Leads</div>
      <div class="tab" onclick="switchTab('seguimiento',this)"><i class="ti ti-clock"></i> Seguimiento</div>
      <div class="tab" onclick="switchTab('reportes',this)"><i class="ti ti-chart-bar"></i> Reportes</div>
      <div class="tab" onclick="switchTab('config',this)"><i class="ti ti-settings"></i> Configuración</div>
    </div>

    <div id="tab-dashboard"></div>
    <div id="tab-leads" style="display:none"></div>
    <div id="tab-seguimiento" style="display:none"></div>
    <div id="tab-reportes" style="display:none"></div>
    <div id="tab-config" style="display:none"></div>
  </div>

  <div class="overlay" id="overlay" onclick="closePanel(event)">
    <div class="panel" id="panel">
      <button class="close-btn" onclick="togglePanel(false)">×</button>
      <h2 id="panel-title" style="margin-top:0; margin-bottom:20px; font-size:18px;">Nuevo Lead</h2>
      
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
        <div class="form-group">
          <label>Nombre Completo *</label>
          <input type="text" id="n-nombre" required>
        </div>
        <div class="form-group">
          <label>Teléfono</label>
          <input type="text" id="n-telefono">
        </div>
      </div>

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:10px;">
        <div class="form-group">
          <label>Correo Electrónico</label>
          <input type="email" id="n-correo">
        </div>
        <div class="form-group">
          <label>Empresa / Organización</label>
          <input type="text" id="n-empresa">
        </div>
      </div>

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:10px;">
        <div class="form-group">
          <label>Estado / Ciudad</label>
          <input type="text" id="n-estado_geo" placeholder="Ej. Puebla">
        </div>
        <div class="form-group">
          <label>Monto Estimado ($)</label>
          <input type="number" id="n-monto" value="0">
        </div>
      </div>

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:10px;">
        <div class="form-group">
          <label>Origen / Fuente</label>
          <select id="n-fuente"></select>
        </div>
        <div class="form-group">
          <label>Producto de Interés</label>
          <select id="n-producto"></select>
        </div>
      </div>

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:10px;">
        <div class="form-group">
          <label>Rango Presupuesto</label>
          <select id="n-presupuesto"></select>
        </div>
        <div class="form-group">
          <label>Área Responsable</label>
          <select id="n-responsable"></select>
        </div>
      </div>

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:10px;">
        <div class="form-group">
          <label>Ejecutivo Asignado</label>
          <select id="n-ejecutivo"></select>
        </div>
        <div class="form-group">
          <label>Prioridad</label>
          <select id="n-prioridad"></select>
        </div>
      </div>

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:10px;">
        <div class="form-group">
          <label>Estado del Pipeline</label>
          <select id="n-situacion"></select>
        </div>
        <div class="form-group">
          <label>Próximo Seguimiento</label>
          <input type="datetime-local" id="n-seg">
        </div>
      </div>

      <div class="form-group" style="margin-top:10px;">
        <label>Notas y Bitácora de Seguimiento</label>
        <textarea id="n-notas" rows="4" placeholder="Escribe aquí los detalles de la llamada o acuerdo..."></textarea>
      </div>

      <div style="margin-top:24px; display:flex; justify-content:space-between;">
        <button id="btn-delete-lead" class=\"btn btn-danger\" onclick="eliminarLeadActual()"><i class="ti ti-trash"></i> Eliminar</button>
        <div style="display:flex; gap:8px;">
          <button class="btn btn-secondary" onclick="togglePanel(false)">Cancelar</button>
          <button class="btn btn-primary" onclick="saveLead()">Guardar Lead</button>
        </div>
      </div>
    </div>
  </div>

  <div id="notification" class="notification-toast"></div>

  <script src="app/app.js"></script>
</body>
</html>
